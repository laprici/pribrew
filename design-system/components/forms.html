<!-- @dsCard group="Componentes (actuales)" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Formulario — Pribrew</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 36px; background: #E8E1D2; color: #16120D;
    font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  h1 { font-size: 18px; letter-spacing: -0.02em; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #73695A; margin: 0 0 24px; }
  .card { background: #F3EEE3; border: 1px solid #C7BDA8; border-radius: 2px; padding: 24px; max-width: 380px; }
  .field { width: 100%; border: 1px solid #C7BDA8; background: #F3EEE3; border-radius: 2px;
    padding: 10px 14px; font-size: 14px; color: #16120D; font-family: Inter, sans-serif; }
  .field::placeholder { color: rgba(115,105,90,0.7); }
  .field:focus { border-color: #C2410C; outline: none; box-shadow: 0 0 0 1px #C2410C; }
  .label { display: block; font-family: "JetBrains Mono", monospace; font-size: 0.65rem;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: #73695A; margin-bottom: 6px; }
  .grp { margin-bottom: 18px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border-radius: 2px; padding: 10px 16px; border: none; cursor: pointer; width: 100%;
    font-family: "JetBrains Mono", monospace; font-size: 0.7rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.12em; background: #C2410C; color: #E8E1D2; }
</style>
</head>
<body>
  <h1>Formulario — actual</h1>
  <p class="sub">.card + .label + .field + .btn-primary. El estado base de hoy.</p>
  <form class="card" onsubmit="return false">
    <div class="grp"><label class="label" for="a">Café (origen)</label><input class="field" id="a" placeholder="Ej. Huila, Colombia"></div>
    <div class="grp"><label class="label" for="b">Dosis</label><input class="field" id="b" placeholder="18"></div>
    <div class="grp"><label class="label" for="c">Temperatura</label><input class="field" id="c" placeholder="93"></div>
    <button class="btn">Registrar</button>
  </form>
</body>
</html>
