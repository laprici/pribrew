<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Tipografía — Pribrew</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 36px; background: #E8E1D2; color: #16120D;
    font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  h1 { font-size: 18px; letter-spacing: -0.02em; margin: 0 0 28px; }
  .block { background: #F3EEE3; border: 1px solid #C7BDA8; border-radius: 2px; padding: 22px; margin-bottom: 16px; }
  .tag { font-family: "JetBrains Mono", monospace; font-size: 0.6rem; text-transform: uppercase;
    letter-spacing: 0.16em; color: #73695A; margin-bottom: 14px; }
  .display { font-size: 30px; font-weight: 600; letter-spacing: -0.025em; }
  .h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .body { font-size: 15px; line-height: 1.55; max-width: 52ch; }
  .readout { font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; }
  .readout-label { font-family: "JetBrains Mono", monospace; font-size: 0.625rem;
    text-transform: uppercase; letter-spacing: 0.16em; color: #73695A; }
  .row { display: flex; gap: 40px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body>
  <h1>Tipografía</h1>
  <div class="block">
    <div class="tag">Inter — interfaz</div>
    <div class="display">Bitácora de extracción</div>
    <div class="h2" style="margin-top:12px">Aeropress · 1:15 · 92&deg;C</div>
    <p class="body" style="margin-top:12px">Texto de cuerpo en Inter. Titulares con tracking ceñido — registro de instrumento, no de marketing.</p>
  </div>
  <div class="block">
    <div class="tag">JetBrains Mono — lecturas numéricas (firma)</div>
    <div class="row">
      <div class="item"><span class="readout-label">Ratio</span><span class="readout" style="font-size:28px">1:16.5</span></div>
      <div class="item"><span class="readout-label">Temp</span><span class="readout" style="font-size:28px">93&deg;C</span></div>
      <div class="item"><span class="readout-label">Tiempo</span><span class="readout" style="font-size:28px">3:12</span></div>
      <div class="item"><span class="readout-label">Post-tueste</span><span class="readout" style="font-size:28px">14d</span></div>
    </div>
  </div>
</body>
</html>
